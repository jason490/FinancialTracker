# Production stack: compiled Go API + Caddy (automatic TLS, API proxy, static SSG frontend).
#
# Usage:
#   cp env.prod.example .env
#   # Set SITE_HOST, API_PUBLIC_URL, FRONTEND_URL, and secrets
#   make prod-build
#   make prod-up
#
# Caddy obtains and renews Let's Encrypt certificates when SITE_HOST resolves to
# this server and ports 80/443 are reachable. Re-run `make prod-build` after
# changing API_PUBLIC_URL or FRONTEND_URL (baked into the SPA).

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy.prod
      args:
        VITE_API_PUBLIC_URL: ${API_PUBLIC_URL:-https://yourdomain.com}
        VITE_FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOST: ${SITE_HOST:-yourdomain.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@yourdomain.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    env_file:
      - path: .env
        required: false
    environment:
      ENV: production
      PORT: 8080
      DATABASE_PATH: /data/main.db
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
    volumes:
      - db_data:/data
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  db_data:
