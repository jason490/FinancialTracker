services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
      - ./app/database:/app/database
      - ./.env:/.env
      - /app/tmp
    environment:
      - CGO_ENABLED=1
      - PORT=8080
      - ENV=development
      - API_PUBLIC_URL=http://laptop-server.home.arpa
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nitro
      - /app/.output
      - /app/.vinxi
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:8080
      - API_PUBLIC_URL=http://laptop-server.home.arpa
      - FRONTEND_URL=http://laptop-server.home.arpa
      - VITE_API_PUBLIC_URL=http://laptop-server.home.arpa
      - VITE_FRONTEND_URL=http://laptop-server.home.arpa
      - VITE_HMR_HOST=laptop-server.home.arpa
      - VITE_HMR_CLIENT_PORT=80
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
